# fly.toml app configuration file generated for live-translate-server on 2026-05-01T06:07:23Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'live-translate-server'
primary_region = 'ams'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
